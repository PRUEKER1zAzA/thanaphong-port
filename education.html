<body>
    <nav>
        <a href="index.html" style="text-decoration: none;"><h2>Portfolio</h2></a>
    <ul>
        <li><a href="index.html" class="active">Home</a></li>

    <main class="main-content">
        <header>
            <h1>My Education</h1>
            <p>ประวัติการศึกษา</p>
        </header>

        <section class="event-card section" msg-active="ปวช.3">
            <div class="event-desc">
                <p>ประกาศนียบัตรวิชาชีพ ชั้นปีที่ 3</p>
            </div>
            <div class="event-gallery">
                <img src="img/whitescreen.png" alt="">
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const displayBox = document.getElementById('display');
            const sections = document.querySelectorAll('section');

            // Observer Settings
            const observerOptions = {
                root: null, // ใช้หน้าจอเบราว์เซอร์เป็นเกณฑ์
                rootMargin: '-20% 0px -70% 0px', // ให้ทำงานเมื่อ Section อยู่ในช่วง 20% จากขอบบนถึง 30% ของจอ
                threshold: 0 // เริ่มทำงานทันทีที่ส่วนใดส่วนหนึ่งของ Section เข้ามาในพื้นที่ที่กำหนด
            };

            // สร้างตัวตรวจจับ
            const scrollObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // ถ้า Section นั้นกำลังแสดงอยู่ (Intersecting)
                    if (entry.isIntersecting) {
                        // ดึงข้อความจาก data-level ของ Section นั้น
                        const level = entry.target.getAttribute('msg-active');

                        // อัปเดตข้อความในกล่องสีดำ
                        displayBox.innerText = `${level}`;

                        // เพิ่มลูกเล่น Animation (Flash)
                        displayBox.classList.add('active-hover');
                        setTimeout(() => {
                            displayBox.classList.remove('active-hover');
                        }, 400);
                    }
                });
            }, observerOptions);

            // สั่งให้ตัวตรวจจับ เริ่มทำงานกับทุก Section ที่เราเลือกไว้
            sections.forEach(sec => scrollObserver.observe(sec));
        });
    </script>
</body>

</html>
